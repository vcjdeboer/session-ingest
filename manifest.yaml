manifestVersion: 1
name: "@vcjdeboer/session-ingest"
version: "2026.07.08.1"
description: "Lift your own Claude Science (operon) sessions out of the local operon-cli.db into open, sealable swamp records — a typed transcript, a turn->execution->artifact->env provenance graph, an immutable content-addressed byte corpus, a Tier-1 /private/tmp input freeze, a per-source external-data inventory, a presence-only credential manifest, and reproducible Docker + Nix environment locks. Reads a disposable scrubbed clone (secret tables dropped and never decrypted; explicit column allow-list), read-only, deterministic, and witness-sealable. Anti-lock-in data portability for your own local sessions."
repository: "https://github.com/vcjdeboer/session-ingest"

paths:
  base: manifest

models:
  - session_ingest.ts

additionalFiles:
  - README.md
  - LICENSE.md

labels:
  - provenance
  - reproducibility
  - data-portability
  - anti-lock-in
  - claude-science
  - data-science
